<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy's Special Day</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* অ্যানালগ ঘড়ির মেইন ফ্রেম */
        .clock {
            width: 300px;
            height: 300px;
            border: 10px solid #ff007c;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 30px #ff007c, inset 0 0 30px #ff007c;
            background: #050505;
        }

        /* ঘড়ির সেন্টার পয়েন্ট */
        .clock::after {
            content: '';
            position: absolute;
            width: 15px; height: 15px;
            background: #fff;
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* কাঁটাগুলোর ডিজাইন */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center; /* এখানেই আসল খেলা */
            border-radius: 10px;
            transform: translateX(-50%);
        }

        .hour { width: 8px; height: 70px; background: #fff; z-index: 3; }
        .min { width: 5px; height: 100px; background: #00d4ff; z-index: 4; }
        .sec { width: 2px; height: 120px; background: #ff007c; z-index: 5; }

        /* ঘড়ির নাম্বারগুলো */
        .clock span {
            position: absolute;
            inset: 15px;
            text-align: center;
            transform: rotate(calc(30deg * var(--i)));
            font-weight: bold;
            font-size: 1.2rem;
        }
        .clock span b {
            display: inline-block;
            transform: rotate(calc(-30deg * var(--i)));
        }

        /* বার্থডে সেকশন */
        #wish-box {
            display: none;
            text-align: center;
            animation: zoomIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .joy-name {
            font-size: 5rem;
            color: #ff007c;
            text-shadow: 0 0 20px #ff007c, 0 0 40px #ff007c;
            margin: 10px 0;
        }

        @keyframes zoomIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .dev-text {
            position: fixed;
            bottom: 20px;
            color: #444;
            letter-spacing: 4px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div id="clock-container" style="text-align: center;">
        <h2 style="margin-bottom: 20px; color: #00d4ff; letter-spacing: 2px;">WAITING FOR 12:00 AM</h2>
        <div class="clock">
            <div id="hr" class="hand hour"></div>
            <div id="mn" class="hand min"></div>
            <div id="sc" class="hand sec"></div>
            
            <span style="--i:1;"><b>1</b></span>
            <span style="--i:2;"><b>2</b></span>
            <span style="--i:3;"><b>3</b></span>
            <span style="--i:4;"><b>4</b></span>
            <span style="--i:5;"><b>5</b></span>
            <span style="--i:6;"><b>6</b></span>
            <span style="--i:7;"><b>7</b></span>
            <span style="--i:8;"><b>8</b></span>
            <span style="--i:9;"><b>9</b></span>
            <span style="--i:10;"><b>10</b></span>
            <span style="--i:11;"><b>11</b></span>
            <span style="--i:12;"><b>12</b></span>
        </div>
    </div>

    <div id="wish-box">
        <h3 style="letter-spacing: 5px;">HAPPY BIRTHDAY</h3>
        <h1 class="joy-name">JOY</h1>
        <p style="color: #00d4ff;">You are special, Joy! Have a blast! 🎂</p>
    </div>

    <div class="dev-text">DEVELOPER: YoUR_Nafu</div>

    <script>
        const hr = document.querySelector("#hr");
        const mn = document.querySelector("#mn");
        const sc = document.querySelector("#sc");

        setInterval(() => {
            let day = new Date();
            let hh = day.getHours() * 30;
            let mm = day.getMinutes() * 6;
            let ss = day.getSeconds() * 6;

            // কাঁটা ঘোরানোর ম্যাজিক
            hr.style.transform = `translateX(-50%) rotateZ(${hh + (mm / 12)}deg)`;
            mn.style.transform = `translateX(-50%) rotateZ(${mm}deg)`;
            sc.style.transform = `translateX(-50%) rotateZ(${ss}deg)`;

            // রাত ১২টা চেক (00:00:00)
            if (day.getHours() === 0 && day.getMinutes() === 0 && day.getSeconds() === 0) {
                document.getElementById('clock-container').style.display = 'none';
                document.getElementById('wish-box').style.display = 'block';
                document.body.style.background = "radial-gradient(circle, #222, #000)";
            }
        }, 1000);
    </script>
</body>
</html>
