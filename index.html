<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Joy!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle, #2e0249, #570a57, #a91079);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        #container {
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        #timer {
            font-size: 4rem;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            display: inline-block;
        }

        #wish-message {
            display: none;
            font-size: 4rem;
            animation: pop 1s ease-out infinite alternate;
        }

        @keyframes pop {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .developer {
            position: fixed;
            bottom: 20px;
            width: 100%;
            font-size: 1.2rem;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        /* Confetti Style */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f2d74e;
            top: -10px;
            z-index: 1;
            animation: fall 3s linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="countdown-wrapper">
            <h1>Joy, তোমার জন্মদিনের বাকি আর মাত্র...</h1>
            <div id="timer">00:00:00</div>
        </div>

        <div id="wish-message">
            <h1 style="color: #FFD700;">🎂 শুভ জন্মদিন, Joy! 🎂</h1>
            <p>দিনটি তোমার অনেক ভালো কাটুক!</p>
        </div>
    </div>

    <div class="developer">Developer: <b>YoUR_Nafu</b></div>

    <script>
        function startCountdown() {
            // আগামীকালের তারিখ নির্ধারণ (রাত ১২টা)
            const now = new Date();
            const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0);
            
            const timerDisplay = document.getElementById('timer');
            const countdownWrapper = document.getElementById('countdown-wrapper');
            const wishMessage = document.getElementById('wish-message');

            const interval = setInterval(() => {
                const currentTime = new Date().getTime();
                const distance = tomorrow - currentTime;

                // সময় গণনা
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                // ডিসপ্লে আপডেট
                timerDisplay.innerHTML = 
                    (hours < 10 ? "0" + hours : hours) + ":" + 
                    (minutes < 10 ? "0" + minutes : minutes) + ":" + 
                    (seconds < 10 ? "0" + seconds : seconds);

                // যখন সময় শেষ হবে
                if (distance < 0) {
                    clearInterval(interval);
                    countdownWrapper.style.display = 'none';
                    wishMessage.style.display = 'block';
                    createConfetti();
                }
            }, 1000);
        }

        function createConfetti() {
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.opacity = Math.random();
                document.body.appendChild(confetti);
            }
        }

        startCountdown();
    </script>
</body>
</html>
