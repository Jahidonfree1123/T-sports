<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Joy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050505;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        /* ঘড়ি ডিজাইন */
        .clock {
            width: 350px;
            height: 350px;
            border: 10px solid #fff;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.2), inset 0 0 50px rgba(255, 255, 255, 0.2);
        }

        .clock::after {
            content: '';
            position: absolute;
            width: 15px; height: 15px;
            background: #ff007c;
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 10px;
        }

        .hour { width: 8px; height: 80px; background: #fff; z-index: 3; }
        .min { width: 5px; height: 110px; background: #00d4ff; z-index: 4; }
        .sec { width: 2px; height: 130px; background: #ff007c; z-index: 5; }

        .clock span {
            position: absolute;
            inset: 20px;
            text-align: center;
            transform: rotate(calc(30deg * var(--i)));
            font-weight: bold;
            font-size: 1.5rem;
        }
        .clock span b { display: inline-block; transform: rotate(calc(-30deg * var(--i))); }

        /* গিফট বক্স ডিজাইন */
        #gift-container {
            display: none;
            text-align: center;
            animation: popIn 1s ease-out;
        }

        .gift-box {
            width: 150px;
            height: 150px;
            background: #ff007c;
            position: relative;
            margin: 0 auto 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .gift-box::before {
            content: '';
            position: absolute;
            width: 20px; height: 100%;
            background: #fff;
            left: 50%; transform: translateX(-50%);
        }

        .gift-box::after {
            content: '';
            position: absolute;
            height: 20px; width: 100%;
            background: #fff;
            top: 50%; transform: translateY(-50%);
        }

        .lid {
            position: absolute;
            width: 170px; height: 40px;
            background: #ff007c;
            top: -20px; left: -10px;
            border: 2px solid #fff;
            z-index: 2;
        }

        .message {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00d4ff;
            text-shadow: 0 0 15px #00d4ff;
            animation: glow 1.5s infinite alternate;
        }

        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        @keyframes glow {
            from { opacity: 0.7; }
            to { opacity: 1; text-shadow: 0 0 30px #00d4ff; }
        }

        .developer {
            position: fixed;
            bottom: 15px;
            font-size: 0.7rem;
            color: #333;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div id="clock-section">
        <div class="clock">
            <div id="hr" class="hand hour"></div>
            <div id="mn" class="hand min"></div>
            <div id="sc" class="hand sec"></div>
            
            <span style="--i:1;"><b>1</b></span>
            <span style="--i:2;"><b>2</b></span>
            <span style="--i:3;"><b>3</b></span>
            <span style="--i:4;"><b>4</b></span>
            <span style="--i:5;"><b>5</b></span>
            <span style="--i:6;"><b>6</b></span>
            <span style="--i:7;"><b>7</b></span>
            <span style="--i:8;"><b>8</b></span>
            <span style="--i:9;"><b>9</b></span>
            <span style="--i:10;"><b>10</b></span>
            <span style="--i:11;"><b>11</b></span>
            <span style="--i:12;"><b>12</b></span>
        </div>
    </div>

    <div id="gift-container">
        <div class="gift-box">
            <div class="lid"></div>
        </div>
        <h2 style="margin-bottom: 10px;">HAPPY BIRTHDAY JOY!</h2>
        <div class="message">তোমার বিকাশ নাম্বার দাও ❤️‍🩹❤️‍🩹</div>
    </div>

    <div class="developer">DEVELOPER: YoUR_Nafu</div>

    <script>
        const hr = document.querySelector("#hr");
        const mn = document.querySelector("#mn");
        const sc = document.querySelector("#sc");

        function updateClock() {
            let now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            let s = now.getSeconds();

            // কাঁটা ঘুরবে
            hr.style.transform = `translateX(-50%) rotateZ(${(h * 30) + (m / 2)}deg)`;
            mn.style.transform = `translateX(-50%) rotateZ(${m * 6}deg)`;
            sc.style.transform = `translateX(-50%) rotateZ(${s * 6}deg)`;

            // রাত ১২টা চেক
            if (h === 0 && m === 0 && s === 0) {
                document.getElementById('clock-section').style.display = 'none';
                document.getElementById('gift-container').style.display = 'block';
                document.body.style.background = "#000";
            }
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
