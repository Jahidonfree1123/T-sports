<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Joy!</title>
    <style>
        body {
            margin: 0;
            background: #050505;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* অ্যানালগ ঘড়ির ডিজাইন */
        .clock {
            width: 300px;
            height: 300px;
            border: 8px solid #00d4ff;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 20px #00d4ff, inset 0 0 20px #00d4ff;
            background: rgba(0, 0, 0, 0.5);
        }

        .clock::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            background: #fff;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            transition: transform 0.05s cubic-bezier(0.1, 2.7, 0.58, 1);
        }

        .hour { width: 6px; height: 70px; background: #fff; z-index: 3; }
        .minute { width: 4px; height: 100px; background: #00d4ff; z-index: 4; }
        .second { width: 2px; height: 120px; background: #ff007c; z-index: 5; }

        /* নাম্বার ডিজাইন */
        .clock span {
            position: absolute;
            inset: 10px;
            text-align: center;
            color: #fff;
            font-size: 1.2rem;
            transform: rotate(calc(30deg * var(--i)));
        }
        .clock span b {
            display: inline-block;
            transform: rotate(calc(-30deg * var(--i)));
        }

        /* বার্থডে মেসেজ */
        #wish-container {
            display: none;
            text-align: center;
            animation: zoomIn 1s ease-out;
        }

        .joy-name {
            font-size: 5rem;
            background: linear-gradient(45deg, #00d4ff, #ff007c, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 0, 124, 0.5);
            margin: 0;
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ডেভেলপার ক্রেডিট */
        .footer {
            position: fixed;
            bottom: 20px;
            font-size: 0.9rem;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
        }

        #status-text {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #00d4ff;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="clock-wrapper">
        <div class="clock">
            <div class="hand hour" id="hour"></div>
            <div class="hand minute" id="minute"></div>
            <div class="hand second" id="second"></div>
            <span style="--i:1;"><b>1</b></span>
            <span style="--i:2;"><b>2</b></span>
            <span style="--i:3;"><b>3</b></span>
            <span style="--i:4;"><b>4</b></span>
            <span style="--i:5;"><b>5</b></span>
            <span style="--i:6;"><b>6</b></span>
            <span style="--i:7;"><b>7</b></span>
            <span style="--i:8;"><b>8</b></span>
            <span style="--i:9;"><b>9</b></span>
            <span style="--i:10;"><b>10</b></span>
            <span style="--i:11;"><b>11</b></span>
            <span style="--i:12;"><b>12</b></span>
        </div>
        <div id="status-text">Joy-এর জন্মদিনের অপেক্ষা...</div>
    </div>

    <div id="wish-container">
        <h2 style="margin-bottom: 0; font-weight: 300; letter-spacing: 5px;">HAPPY BIRTHDAY</h2>
        <h1 class="joy-name">JOY</h1>
        <p style="color: #00d4ff; font-size: 1.5rem;">The Legend was born today!</p>
    </div>

    <div class="footer">Developer: YoUR_Nafu</div>
